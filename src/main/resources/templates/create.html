<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Car</title>
</head>
<body>

<h1>Add New Car</h1>

<form action="#" th:action="@{/cars/create}" th:object="${car}" method="post">

    <p>
        <label>Brand:</label>
        <input type="text" th:field="*{brand}" required>
    </p>

    <p>
        <label>Model:</label>
        <input type="text" th:field="*{model}" required>
    </p>

    <p>
        <label>Year:</label>
        <input type="number" th:field="*{year}" min="1886" required>
    </p>

    <p>
        <label>Price:</label>
        <input type="number" step="0.01" th:field="*{price}" min="0" required>
    </p>

    <p>
        <label>Description:</label>
        <textarea th:field="*{description}"></textarea>
    </p>

    <button type="submit">Save</button>
    <a href="/cars">Cancel</a>

</form>

</body>
</html>
